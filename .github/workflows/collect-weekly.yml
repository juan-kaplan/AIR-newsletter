name: Collect Weekly Robotics Digest

on:
  schedule:
    # GitHub Actions cron is UTC. This is Monday 09:30 in Argentina.
    - cron: "30 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      TZ: America/Argentina/Buenos_Aires
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm newsletter:collect
      - name: Commit weekly digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/curated/weekly
          if git diff --cached --quiet; then
            echo "No weekly digest changes to commit."
          else
            git commit -m "chore: collect weekly robotics digest"
            git push
          fi
