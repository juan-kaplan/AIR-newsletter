name: Send Newsletter

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run?"
        required: true
        default: "true"

jobs:
  send:
    runs-on: ubuntu-latest
    env:
      NEWSLETTER_FROM: jkaplan@udesa.edu.ar
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "465"
      SMTP_SECURE: "true"
      SMTP_USER: jkaplan@udesa.edu.ar
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALLOWED_RECIPIENT_DOMAIN: udesa.edu.ar
      WORKER_BASE_URL: ${{ secrets.WORKER_BASE_URL }}
      WORKER_ADMIN_TOKEN: ${{ secrets.WORKER_ADMIN_TOKEN }}
      MAX_RECIPIENTS: ${{ vars.MAX_RECIPIENTS || '30' }}
      MAX_EMAILS_PER_RUN: ${{ vars.MAX_EMAILS_PER_RUN || '35' }}
      NEWSLETTER_AI_PROVIDER: ${{ vars.NEWSLETTER_AI_PROVIDER || 'none' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      NVIDIA_MODEL: ${{ vars.NVIDIA_MODEL || 'meta/llama-3.1-70b-instruct' }}
      TZ: America/Argentina/Buenos_Aires
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - name: Send newsletter
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "false" ]; then
            pnpm newsletter:send-test --to jkaplan@udesa.edu.ar --confirm
          else
            pnpm newsletter:send-test --to jkaplan@udesa.edu.ar --dry-run
          fi
